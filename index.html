// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────

const S = {
  feeds: {
    get: () => {
      const feeds = parse('ronda_feeds', []);
      // Migrate: category (string) → categories (array)
      return feeds.map(f => ({
        ...f,
        categories: f.categories || (f.category ? [f.category] : ['Notícias Gerais']),
      }));
    },
    set: v => save('ronda_feeds', v),
  },
  states:      { get: () => parse('ronda_states', {}),              set: v => save('ronda_states', v) },
  cache:       { get: () => parse('ronda_cache', {}),               set: v => save('ronda_cache', v) },
  categories:  { get: () => parse('ronda_categories', null) ?? [...DEFAULT_CATEGORIES],
                 set: v => save('ronda_categories', v) },
  webSources:  { get: () => parse('ronda_websources', []),          set: v => save('ronda_websources', v) },
  saved:       { get: () => parse('ronda_saved', []),              set: v => save('ronda_saved', v) },
};
function parse(k, def) { try { return JSON.parse(localStorage.getItem(k) ?? 'null') ?? def; } catch { return def; } }
function save(k, v)    { localStorage.setItem(k, JSON.stringify(v)); }

// ─────────────────────────────────────────────
// API
// ─────────────────────────────────────────────

const CACHE_TTL = 30 * 60 * 1000; // 30 min

// ─────────────────────────────────────────────
// TRANSLATION
// ─────────────────────────────────────────────

const TRANS = {
  get: () => parse('ronda_trans', {}),
  set: v  => save('ronda_trans', v),
};

async function gtranslate(text) {
  if (!text?.trim()) return text;
  const cache = TRANS.get();
  if (cache[text] !== undefined) return cache[text];

  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=pt-BR&dt=t&q=${encodeURIComponent(text)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`translate HTTP ${res.status}`);
  const json = await res.json();
  const out  = json[0].map(s => s[0]).join('');

  cache[text] = out;
  // LRU-like eviction: keep max 500 entries
  const keys = Object.keys(cache);
  if (keys.length > 500) keys.slice(0, keys.length - 500).forEach(k => delete cache[k]);
  TRANS.set(cache);
  return out;
}

async function translateItems(items) {
  return Promise.all(items.map(async item => {
    try {
      const [title, description] = await Promise.all([
        gtranslate(item.title),
        gtranslate(item.description),
      ]);
      return { ...item, title, description };
    } catch {
      return item; // keep original if translation fails
    }
  }));
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(new Error(`Falha ao ler ${file.name}`));
    reader.readAsDataURL(file);
  });
}

// Fetch raw content: native bridge (macOS app) → web proxy → direct → CORS proxies
async function fetchRaw(url) {
  const attempts = [
    // 0. Native fetch via Swift URLSession (NO CORS — macOS app only)
    async () => {
      if (!window.__hasNativeFetch) throw new Error('not native');
      return await window.nativeFetch(url);
    },
    // 1. Same-origin Node proxy (browser web app mode)
    async () => {
      if (location.protocol === 'file:') throw new Error('no web proxy');
      const r = await fetch(`/api/fetch?url=${encodeURIComponent(url)}`);
      if (!r.ok) throw new Error(`proxy HTTP ${r.status}`);
      return r.text();
    },
    // 2. Direct (works when server sends Access-Control-Allow-Origin: *)
    async () => {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    },
    // 3. codetabs (reliable, returns raw)
    async () => {
      const r = await fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const t = await r.text();
      if (t.startsWith('{') && t.includes('error')) throw new Error('bloqueado');
      return t;
    },
    // 4. allorigins (wraps response in JSON)
    async () => {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      if (!j.contents) throw new Error('sem conteúdo');
      return j.contents;
    },
    // 5. thingproxy (returns raw)
    async () => {
      const r = await fetch(`https://thingproxy.freeboard.io/fetch/${url}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    },
  ];
  let lastErr;
  for (const attempt of attempts) {
    try { return await attempt(); } catch (e) { lastErr = e; }
  }
  throw new Error(`Não foi possível acessar o feed (${lastErr?.message}). Verifique a URL.`);
}

async function fetchFeed(feedUrl, count = 10) {
  // Check cache
  const cache = S.cache.get();
  const cached = cache[feedUrl];
  if (cached && Date.now() - cached.ts < CACHE_TTL) return cached.data;

  const xml = await fetchRaw(feedUrl);
  const doc  = new DOMParser().parseFromString(xml, 'text/xml');
  if (doc.querySelector('parsererror')) throw new Error('XML inválido — verifique a URL do feed');

  const isAtom = !!doc.querySelector('feed');
  const data   = isAtom ? parseAtom(doc, feedUrl, count) : parseRss(doc, feedUrl, count);

  cache[feedUrl] = { ts: Date.now(), data };
  S.cache.set(cache);
  return data;
}

function txt(el, sel) {
  return el?.querySelector(sel)?.textContent?.trim() || '';
}

function parseRss(doc, feedUrl, count) {
  const ch = doc.querySelector('channel');
  const info = {
    title:   txt(ch, 'title'),
    link:    txt(ch, 'link') || feedUrl,
    favicon: '',
  };
  const isGoogleNews = feedUrl.includes('news.google.com');
  const items = [...doc.querySelectorAll('item')].slice(0, count).map(it => {
    const enclosure = it.querySelector('enclosure[type^="image"]');
    const mediaTh   = it.querySelector('thumbnail') || it.getElementsByTagNameNS('*','thumbnail')[0];
    const mediaCnt  = it.getElementsByTagNameNS('*','content')[0];
    const thumbnail = mediaTh?.getAttribute('url') || mediaCnt?.getAttribute('url') || enclosure?.getAttribute('url') || null;
    const rawDesc   = txt(it, 'description');
    // Strip " - SourceName" suffix from Google News titles
    let title = txt(it, 'title') || '(sem título)';
    if (isGoogleNews) {
      const sourceEl = it.querySelector('source');
      const srcName  = sourceEl?.textContent?.trim();
      if (srcName && title.endsWith(' - ' + srcName)) {
        title = title.slice(0, -(3 + srcName.length));
      }
    }
    return {
      id:          txt(it, 'guid') || txt(it, 'link'),
      title,
      link:        txt(it, 'link') || '#',
      description: rawDesc.replace(/<[^>]*>/g, '').substring(0, 220),
      pubDate:     new Date(txt(it, 'pubDate') || Date.now()),
      thumbnail,
      author:      txt(it, 'author') || it.getElementsByTagNameNS('*','creator')[0]?.textContent?.trim() || '',
    };
  });
  return { info, items };
}

function parseAtom(doc, feedUrl, count) {
  const feed = doc.querySelector('feed');
  const info = {
    title:   txt(feed, 'title'),
    link:    feed.querySelector('link[rel="alternate"]')?.getAttribute('href') || feedUrl,
    favicon: '',
  };
  const items = [...doc.querySelectorAll('entry')].slice(0, count).map(entry => {
    const link    = entry.querySelector('link[rel="alternate"]')?.getAttribute('href')
                 || entry.querySelector('link')?.getAttribute('href') || '#';
    const rawDesc = txt(entry, 'summary') || txt(entry, 'content');
    const mediaTh = entry.getElementsByTagNameNS('*','thumbnail')[0];
    return {
      id:          txt(entry, 'id') || link,
      title:       txt(entry, 'title') || '(sem título)',
      link,
      description: rawDesc.replace(/<[^>]*>/g, '').substring(0, 220),
      pubDate:     new Date(txt(entry, 'updated') || txt(entry, 'published') || Date.now()),
      thumbnail:   mediaTh?.getAttribute('url') || null,
      author:      txt(entry, 'author name') || '',
    };
  });
  return { info, items };
}

// ─────────────────────────────────────────────
// WEB SCRAPING
// ─────────────────────────────────────────────

function resolveUrl(href, baseUrl) {
  if (!href) return '';
  try {
    return new URL(href, baseUrl).href;
  } catch { return ''; }
}

function normalizedArticleKey(url) {
  try {
    const u = new URL(url);
    u.protocol = 'https:';
    u.hostname = normalizeHost(u.hostname);
    u.hash = '';
    ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','ref','source'].forEach(p => u.searchParams.delete(p));
    const qs = u.searchParams.toString();
    return `${u.hostname}${u.pathname.replace(/\/+$/, '')}${qs ? `?${qs}` : ''}`.toLowerCase();
  } catch {
    return String(url || '').replace(/\/+$/, '').toLowerCase();
  }
}

function isForbesSite(url) {
  try { return normalizeHost(new URL(url).hostname) === 'forbes.com'; }
  catch { return false; }
}

function isForbesArticleUrl(url) {
  try {
    const u = new URL(url);
    return isForbesSite(u.href) && /^\/sites\/[^/]+\/20\d{2}\/\d{2}\/\d{2}\/[^/]+\/?$/i.test(u.pathname);
  } catch { return false; }
}

function isStrongHomepageArticle(item, baseUrl) {
  if (!item?.link) return false;
  if (isForbesSite(baseUrl)) return isForbesArticleUrl(item.link);
  return !isLikelyNonArticleUrl(item.link);
}

function preferArticleItem(current, next) {
  if (!current) return next;
  if (!next) return current;
  const curDesc = cleanArticleText(current.description || '');
  const nextDesc = cleanArticleText(next.description || '');
  if (!curDesc && nextDesc) return { ...next, _idx: current._idx ?? next._idx };
  if (curDesc && nextDesc && nextDesc.length > curDesc.length + 20) return { ...next, _idx: current._idx ?? next._idx };
  const curTitle = cleanArticleText(current.title || '');
  const nextTitle = cleanArticleText(next.title || '');
  if (nextTitle.length > curTitle.length + 15) return { ...next, _idx: current._idx ?? next._idx, description: nextDesc || curDesc };
  return { ...current, description: curDesc || nextDesc };
}

function isBlockedHtmlResponse(raw) {
  return /please enable js and disable any ad blocker|captcha-delivery|datadome|access denied/i.test(raw || '');
}

function parseDateText(text) {
  if (!text) return null;
  const clean = text.trim().replace(/\s+/g, ' ');
  const now = new Date();

  // ── Relative expressions (pt-BR + en) ────────────────────────────────────
  if (/agora|just now|moments? ago/i.test(clean)) return now.toISOString();

  // "1h ago", "2h", "+2h ago" (Forbes-style abbreviations)
  const hShort = clean.match(/^\+?(\d+)\s*h(?:r|rs|ours?)?\s*(?:ago)?$/i);
  if (hShort) return new Date(now - +hShort[1] * 3600000).toISOString();

  // "30m ago", "5m"
  const mShort = clean.match(/^\+?(\d+)\s*m(?:in|ins|inutes?)?\s*(?:ago)?$/i);
  if (mShort) return new Date(now - +mShort[1] * 60000).toISOString();

  // "+1 day ago", "2 days ago", "há 2 dias"
  const dShort = clean.match(/^\+?(\d+)\s*d(?:ay|ays)?\s*(?:ago)?$/i);
  if (dShort) { const d = new Date(now); d.setDate(d.getDate() - +dShort[1]); return d.toISOString(); }

  const minsAgo = clean.match(/há (\d+)\s*min|(\d+)\s*min(?:utes?)? ago/i);
  if (minsAgo) { const d = new Date(now - (+(minsAgo[1]||minsAgo[2]))*60000); return d.toISOString(); }

  const hoursAgo = clean.match(/há (\d+)\s*hora|(\d+)\s*hours? ago/i);
  if (hoursAgo) { const d = new Date(now - (+(hoursAgo[1]||hoursAgo[2]))*3600000); return d.toISOString(); }

  if (/ontem|yesterday/i.test(clean)) {
    const d = new Date(now); d.setDate(d.getDate() - 1); return d.toISOString();
  }
  const daysAgo = clean.match(/há (\d+)\s*dia|(\d+)\s*days? ago/i);
  if (daysAgo) { const d = new Date(now); d.setDate(d.getDate() - (+(daysAgo[1]||daysAgo[2]))); return d.toISOString(); }

  // ── ISO / RFC patterns ────────────────────────────────────────────────────
  const iso = clean.match(/\d{4}-\d{2}-\d{2}T[\d:+Z.-]+/);
  if (iso) { const d = new Date(iso[0]); if (!isNaN(d)) return d.toISOString(); }

  const isoDate = clean.match(/\d{4}-\d{2}-\d{2}/);
  if (isoDate) { const d = new Date(isoDate[0]+'T12:00:00'); if (!isNaN(d)) return d.toISOString(); }

  // ── dd/MM/yyyy or dd.MM.yyyy (Brazilian format) ───────────────────────────
  const brDate = clean.match(/(\d{2})[\/.](\d{2})[\/.](\d{4})/);
  if (brDate) {
    const d = new Date(`${brDate[3]}-${brDate[2]}-${brDate[1]}T12:00:00`);
    if (!isNaN(d)) return d.toISOString();
  }

  // ── MM/DD/YYYY (US format) ────────────────────────────────────────────────
  const usDate = clean.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (usDate && +usDate[1] <= 12) {
    const d = new Date(`${usDate[3]}-${usDate[1].padStart(2,'0')}-${usDate[2].padStart(2,'0')}T12:00:00`);
    if (!isNaN(d)) return d.toISOString();
  }

  // ── Native parse (catches "March 24, 2026", "24 mar 2026", etc.) ──────────
  if (clean.length < 80) {
    const d = new Date(clean);
    if (!isNaN(d) && d.getFullYear() > 2000 && d.getFullYear() < 2100) return d.toISOString();
  }
  return null;
}

// ── Extract date encoded in URL path ─────────────────────────────────────
// Returns { iso, approx } or null
// approx=true means only year+month known (e.g. /2026/03/ on WordPress sites)
function dateFromUrl(url) {
  // Full date: /2026/03/24/ or /2026-03-24/ (Caixin, etc.)
  const mFull = url.match(/\/(20\d{2})[\/\-](\d{2})[\/\-](\d{2})\//);
  if (mFull) {
    const d = new Date(`${mFull[1]}-${mFull[2]}-${mFull[3]}T12:00:00`);
    if (!isNaN(d)) return { iso: d.toISOString(), approx: false };
  }
  // Year+month only: /2026/03/ or /2026-03/ — use 15th as midpoint for sorting
  const mMonth = url.match(/\/(20\d{2})[\/\-](0[1-9]|1[0-2])\//);
  if (mMonth) {
    const d = new Date(`${mMonth[1]}-${mMonth[2]}-15T12:00:00`);
    if (!isNaN(d)) return { iso: d.toISOString(), approx: true };
  }
  return null;
}
// Shorthand returning only ISO string
function dateIsoFromUrl(url) { return dateFromUrl(url)?.iso ?? null; }

// ── Extract from Next.js __NEXT_DATA__ (Forbes, many modern news sites) ───
function extractFromNextData(doc, baseUrl) {
  const script = doc.getElementById('__NEXT_DATA__');
  if (!script) return [];
  try {
    const data = JSON.parse(script.textContent);
    const results = [];
    const seenLinks = new Set();
    const seenObjs  = new WeakSet();
    const forbesMode = isForbesSite(baseUrl);

    function walk(obj, depth) {
      if (depth > 20 || !obj || typeof obj !== 'object') return;
      if (seenObjs.has(obj)) return;
      seenObjs.add(obj);

      const rawUrl   = obj.uri || obj.url || obj.href || obj.canonicalUrl || obj.link
                    || obj.permalink || obj.absoluteUrl || obj.articleUrl || obj.articleUri;
      const rawTitle = obj.title || obj.headline || obj.name;
      if (rawUrl && rawTitle && typeof rawTitle === 'string'
          && rawTitle.length > 10 && rawTitle.length < 600) {
        const link = resolveUrl(String(rawUrl), baseUrl);
        const key = link.split('#')[0];
        if (link && link.startsWith('http') && !seenLinks.has(key)
            && (!forbesMode || isForbesArticleUrl(link))) {
          seenLinks.add(key);
          let pubDate = null;
          const rawDate = obj.date || obj.datePublished || obj.publishedAt
                       || obj.createdAt || obj.publishDate || obj.timestamp;
          if (rawDate && typeof rawDate === 'string') {
            pubDate = parseDateText(rawDate) || dateIsoFromUrl(link);
          } else if (typeof rawDate === 'number' && rawDate > 0) {
            const d = rawDate > 1e11 ? new Date(rawDate) : new Date(rawDate * 1000);
            pubDate = isNaN(d) ? null : d.toISOString();
          } else {
            pubDate = dateIsoFromUrl(link);
          }
          const urlDateInfo = dateFromUrl(link);
          const fromUrl = !rawDate && !!pubDate; // date came from URL, not from data field
          results.push({
            title:       rawTitle.trim(),
            link,
            description: String(obj.description || obj.deck || obj.excerpt || obj.summary || '')
                           .replace(/<[^>]*>/g, '').substring(0, 280),
            pubDate,
            _dateApprox: !pubDate && urlDateInfo?.approx,
            _dateFromUrl: fromUrl,
          });
        }
      }
      // Recurse
      if (Array.isArray(obj)) {
        for (const item of obj) walk(item, depth + 1);
      } else {
        for (const val of Object.values(obj)) {
          if (val && typeof val === 'object') walk(val, depth + 1);
        }
      }
    }
    walk(data, 0);
    return results;
  } catch {
    // JSON.parse failed (common when CORS proxy truncates large __NEXT_DATA__).
    // Fall back to regex extraction on the raw text.
    return extractFromNextDataText(script.textContent, baseUrl);
  }
}

// Regex-based fallback: works even on truncated JSON strings
function extractFromNextDataText(text, baseUrl) {
  if (!text) return [];
  const results = [];
  const seenLinks = new Set();
  const forbesMode = isForbesSite(baseUrl);

  // Build a map of all "uri"|"url"|"permalink" → value pairs
  const urlRe = /"(?:uri|url|href|canonicalUrl|permalink|absoluteUrl|articleUrl|articleUri)"\s*:\s*"([^"]{10,300})"/g;
  const titleRe = /"(?:title|headline|name)"\s*:\s*"([^"]{5,300})"/g;
  const descRe  = /"(?:description|deck|excerpt|summary)"\s*:\s*"([^"]{5,500})"/g;
  const dateRe  = /"(?:date|datePublished|publishedAt|createdAt|publishDate|timestamp)"\s*:\s*"([^"]{6,40})"/g;

  // Collect all positions of each field
  function collectAll(re) {
    const map = [];
    let m;
    re.lastIndex = 0;
    while ((m = re.exec(text)) !== null) map.push({ pos: m.index, val: m[1] });
    return map;
  }

  const urls   = collectAll(urlRe);
  const titles = collectAll(titleRe);
  const descs  = collectAll(descRe);
  const dates  = collectAll(dateRe);

  // For each URL, find the closest title within ±2000 chars
  for (const u of urls) {
    const rawUrl = u.val.replace(/\\u002F/g, '/').replace(/\\\//g, '/');
    if (!rawUrl.startsWith('http') && !rawUrl.startsWith('/')) continue;
    const link = resolveUrl(rawUrl, baseUrl);
    if (!link || !link.startsWith('http')) continue;
    const key = link.split('#')[0];
    if (seenLinks.has(key) || (forbesMode && !isForbesArticleUrl(link))) continue;

    // Find closest title
    let best = null, bestDist = Infinity;
    for (const t of titles) {
      const d = Math.abs(t.pos - u.pos);
      if (d < bestDist && d < 2000) { bestDist = d; best = t.val; }
    }
    if (!best || best.length < 10) continue;

    // Find closest description
    let desc = '';
    let bestDescDist = Infinity;
    for (const d of descs) {
      const dist = Math.abs(d.pos - u.pos);
      if (dist < bestDescDist && dist < 3000) { bestDescDist = dist; desc = d.val; }
    }

    // Find closest date
    let pubDate = null;
    let bestDateDist = Infinity;
    for (const d of dates) {
      const dist = Math.abs(d.pos - u.pos);
      if (dist < bestDateDist && dist < 3000) { bestDateDist = dist; pubDate = parseDateText(d.val) || dateIsoFromUrl(link); }
    }
    if (!pubDate) pubDate = dateIsoFromUrl(link);

    seenLinks.add(key);
    results.push({
      title:       best.replace(/\\"/g, '"').replace(/\\n/g, ' ').trim(),
      link,
      description: desc.replace(/\\"/g, '"').replace(/\\n/g, ' ').replace(/<[^>]*>/g, '').substring(0, 280),
      pubDate,
      _dateFromUrl: !pubDate || pubDate === dateIsoFromUrl(link),
    });
  }
  return results;
}

function extractFromJsonLd(doc, baseUrl) {
  const results = [];
  doc.querySelectorAll('script[type="application/ld+json"]').forEach(s => {
    try {
      const raw = JSON.parse(s.textContent);
      const nodes = Array.isArray(raw) ? raw : [raw];
      for (const node of nodes) {
        const type = node['@type'];
        // Single article
        if (['NewsArticle','Article','BlogPosting','ReportageNewsArticle'].includes(type)) {
          const link = resolveUrl(node.url || node.mainEntityOfPage?.['@id'] || '', baseUrl);
          if (link) results.push({
            title:       node.headline || node.name || '',
            link,
            description: (node.description || node.abstract || '').replace(/<[^>]*>/g,'').substring(0,280),
            pubDate:     node.datePublished || node.dateModified || null,
          });
        }
        // ItemList
        if (type === 'ItemList' && Array.isArray(node.itemListElement)) {
          for (const el of node.itemListElement) {
            const item = el.item || el;
            const link = resolveUrl(item.url || item['@id'] || '', baseUrl);
            if (link && (item.name || item.headline)) results.push({
              title:       item.headline || item.name || '',
              link,
              description: (item.description || '').replace(/<[^>]*>/g,'').substring(0,280),
              pubDate:     item.datePublished || null,
            });
          }
        }
        // WebPage with breadcrumb / mainEntity
        if (node.mainEntity && node.mainEntity['@type'] === 'ItemList') {
          (node.mainEntity.itemListElement || []).forEach(el => {
            const item = el.item || el;
            const link = resolveUrl(item.url || item['@id'] || '', baseUrl);
            if (link && item.name) results.push({
              title: item.name, link,
              description: (item.description||'').substring(0,280),
              pubDate: item.datePublished || null,
            });
          });
        }
      }
    } catch { /* skip malformed */ }
  });
  return results.filter(r => r.title && r.link);
}

function cleanArticleText(text) {
  return (text || '').replace(/\s+/g, ' ').trim();
}

function normalizeHost(host) {
  return (host || '').replace(/^www\./, '');
}

function isSameSiteLink(href, baseUrl) {
  try {
    const url = new URL(href);
    const base = new URL(baseUrl);
    return normalizeHost(url.hostname) === normalizeHost(base.hostname);
  } catch { return false; }
}

function isLikelyNonArticleUrl(url) {
  let u;
  try { u = new URL(url); } catch { return true; }
  const path = u.pathname.toLowerCase().replace(/\/+$/, '');
  if (!path || path === '') return true;
  if (isForbesSite(url) && !isForbesArticleUrl(url)) return true;
  if (path.split('/').filter(Boolean).length === 1 && path.length < 18) return true;
  if (/\.(jpg|jpeg|png|gif|webp|svg|pdf|zip|mp4|mp3|css|js)$/i.test(path)) return true;
  if (/(\/|^)(tag|tags|topic|topics|categoria|category|editoria|section|author|authors|colunistas|search|busca|login|signin|signup|account|newsletter|podcasts?|videos?|video|live|privacy|terms|about|contato|contact)(\/|$)/i.test(path)) return true;
  if (/[?&](utm_|fbclid|gclid|output=)/i.test(u.search)) return true;
  return false;
}

function titleFromAnchor(a, container) {
  const candidates = [
    a.getAttribute('aria-label') ||
      '',
    a.getAttribute('title') || '',
    a.querySelector('h1,h2,h3,h4,[class*="title"],[class*="headline"],[class*="chamada"]')?.textContent || '',
    container?.querySelector('h1,h2,h3,h4,[class*="title"],[class*="headline"],[class*="chamada"]')?.textContent || '',
    a.textContent || '',
  ].map(cleanArticleText);

  return candidates.find(title =>
    title.length >= 10 &&
    title.length <= 260 &&
    !/^(menu|home|mais|more|next|previous|voltar|entrar|assinar|subscribe|newsletter)$/i.test(title)
  ) || '';
}

function scoreArticleLink(a, href, title, container) {
  let score = 0;
  const path = new URL(href).pathname.toLowerCase();
  if (title.length >= 18) score += 2;
  if (title.length >= 45) score += 1;
  if (/(^|\/)(20\d{2}|article|articles|news|noticia|noticias|materia|story|stories|post|posts|reportagem)(\/|$)/i.test(path)) score += 3;
  if (/\/20\d{2}[\/\-]\d{2}[\/\-]\d{2}\//.test(path)) score += 3;
  if (/\/[a-z0-9-]{10,}[-\d]*\.html$/i.test(path)) score += 2;
  if ((path.match(/-/g) || []).length >= 2) score += 2;
  if ((path.split('/').filter(Boolean).pop() || '').length >= 18) score += 1;
  if (a.closest('main,article,section')) score += 1;
  if (container?.querySelector('img,p,time,[datetime]')) score += 1;
  if (container?.matches?.('[class*="card"],[class*="item"],[class*="story"],[class*="article"],[class*="post"],li,article')) score += 1;
  return score;
}

function extractDateFromContainer(container) {
  if (!container) return null;
  const timeEl = container.querySelector('time[datetime],time[data-datetime],time');
  if (timeEl) {
    return timeEl.getAttribute('datetime') || timeEl.getAttribute('data-datetime') || parseDateText(timeEl.textContent);
  }
  const dateEl = container.querySelector('[class*="date"],[class*="time"],[class*="timestamp"],[class*="publish"],[class*="posted"],[class*="ago"]');
  return dateEl ? parseDateText(dateEl.textContent) : null;
}

function extractDescriptionFromContainer(container) {
  if (!container) return '';
  for (const el of container.querySelectorAll('p,[class*="deck"],[class*="summary"],[class*="excerpt"],[class*="description"],[class*="subtitle"],[class*="chamada"]')) {
    const t = cleanArticleText(el.textContent);
    if (t.length > 30 && t.length < 500) return t.substring(0, 280);
  }
  return '';
}

function extractFromArticleElements(doc, baseUrl) {
  const results = [];
  // Try semantic article tags first, then common class patterns
  const containers = [...new Set([
    ...doc.querySelectorAll('article'),
    ...doc.querySelectorAll('[class*="article-item"],[class*="news-item"],[class*="story-card"],[class*="post-card"],[class*="content-card"],[class*="card"],[class*="headline"],[class*="chamada"]'),
  ])];
  for (const c of containers) {
    const heading = c.querySelector('h1,h2,h3,h4,[class*="title"],[class*="headline"],[class*="chamada"]');
    const aEl = heading?.querySelector('a[href]') || heading?.closest('a[href]') || c.querySelector('a[href]');
    if (!aEl) continue;
    const link = resolveUrl(aEl.getAttribute('href'), baseUrl);
    if (!link || !link.startsWith('http') || !isSameSiteLink(link, baseUrl) || isLikelyNonArticleUrl(link)) continue;
    const title = cleanArticleText(heading?.textContent || titleFromAnchor(aEl, c));
    if (!title || title.length < 8) continue;
    const pubDate = extractDateFromContainer(c);
    const description = extractDescriptionFromContainer(c);
    results.push({ title, link, description, pubDate });
  }
  return results;
}

function extractFromLinks(doc, baseUrl) {
  const results = [];
  const seen = new Set();
  for (const a of doc.querySelectorAll('a[href]')) {
    const href = resolveUrl(a.getAttribute('href'), baseUrl);
    if (!href.startsWith('http')) continue;
    const canonical = href.split('#')[0];
    if (seen.has(canonical) || !isSameSiteLink(canonical, baseUrl) || isLikelyNonArticleUrl(canonical)) continue;
    const parent = a.closest('article,[class*="item"],[class*="card"],[class*="story"],[class*="headline"],[class*="chamada"],li') || a.parentElement;
    const title = titleFromAnchor(a, parent);
    if (!title || title.length < 10) continue;
    if (scoreArticleLink(a, canonical, title, parent) < 3) continue;
    seen.add(canonical);
    const urlDateInfo = dateFromUrl(canonical);
    let pubDate = urlDateInfo?.iso ?? null;
    let fromUrl = !!pubDate;
    if (!pubDate && parent) {
      pubDate = extractDateFromContainer(parent);
      if (pubDate) fromUrl = false;
    }
    results.push({ title, link: canonical, description: extractDescriptionFromContainer(parent), pubDate, _dateApprox: urlDateInfo?.approx && !pubDate, _dateFromUrl: fromUrl });
  }
  return results;
}

// ── RSS / Atom feed auto-discovery ────────────────────────────────────────
// Tries common feed paths for a site root. Returns articles in scrapeWebPage format.
async function extractFromRss(siteUrl) {
  const { origin, hostname } = new URL(siteUrl);
  // Try to discover feed URL from HTML <link> tags first, then common paths
  const commonPaths = [
    `${origin}/feed`,
    `${origin}/feed/`,
    `${origin}/rss.xml`,
    `${origin}/feed.xml`,
    `${origin}/atom.xml`,
    `${origin}/rss`,
    `${origin}/news.rss`,
    `${origin}/feeds/posts/default`,
  ];
  // Known site-specific feeds
  const norm = hostname.replace(/^www\./, '');
  if (norm === 'forbes.com')       commonPaths.unshift('https://www.forbes.com/real-time/feed2/');
  if (norm === 'wired.com')        commonPaths.unshift('https://www.wired.com/feed/rss');
  if (norm === 'techcrunch.com')   commonPaths.unshift('https://techcrunch.com/feed/');
  if (norm === 'theverge.com')     commonPaths.unshift('https://www.theverge.com/rss/index.xml');
  if (norm === 'bbc.com' || norm === 'bbc.co.uk') commonPaths.unshift('https://feeds.bbci.co.uk/news/rss.xml');

  for (const url of commonPaths) {
    try {
      const raw = await Promise.race([
        fetchRaw(url),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000)),
      ]);
      const doc = new DOMParser().parseFromString(raw, 'text/xml');
      if (doc.querySelector('parsererror')) continue;
      const isAtom = !!doc.querySelector('feed');
      const itemEls = isAtom ? [...doc.querySelectorAll('entry')] : [...doc.querySelectorAll('item')];
      if (itemEls.length < 3) continue;
      const results = itemEls.map(it => {
        let link, title, desc, dateStr;
        if (isAtom) {
          link    = it.querySelector('link[rel="alternate"]')?.getAttribute('href')
                 || it.querySelector('link')?.getAttribute('href') || '';
          title   = it.querySelector('title')?.textContent || '';
          desc    = (it.querySelector('summary')?.textContent || it.querySelector('content')?.textContent || '')
                      .replace(/<[^>]*>/g, '').trim().substring(0, 280);
          dateStr = it.querySelector('updated')?.textContent || it.querySelector('published')?.textContent || '';
        } else {
          link    = it.querySelector('link')?.textContent?.trim()
                 || it.querySelector('guid')?.textContent?.trim() || '';
          title   = it.querySelector('title')?.textContent || '';
          desc    = (it.querySelector('description')?.textContent || '')
                      .replace(/<[^>]*>/g, '').trim().substring(0, 280);
          dateStr = it.querySelector('pubDate')?.textContent || it.querySelector('dc\\:date,date')?.textContent || '';
        }
        const pubDate = dateStr ? (() => { const d = new Date(dateStr); return isNaN(d) ? null : d.toISOString(); })() : null;
        return {
          title:       title.trim().replace(/\s+/g, ' '),
          link:        link.trim(),
          description: desc,
          pubDate,
          _dateApprox: false,
          _fromRss:    true,
        };
      }).filter(a => a.title && a.link && a.link.startsWith('http'));
      if (results.length > 0) return results;
    } catch { /* try next */ }
  }
  return [];
}

// ── WordPress REST API extractor ──────────────────────────────────────────
// Works for any WordPress site — returns full ISO dates in one request
async function extractFromWordPress(siteUrl, limit = 100) {
  try {
    const { origin } = new URL(siteUrl);
    const apiUrl = `${origin}/wp-json/wp/v2/posts?per_page=${limit}&_fields=title,link,excerpt,date,modified`;
    const raw = await fetchRaw(apiUrl);
    const posts = JSON.parse(raw);
    if (!Array.isArray(posts) || posts.length === 0) return [];
    return posts.map(p => ({
      title:       (p.title?.rendered || '').replace(/<[^>]*>/g, '').trim(),
      link:        p.link || '',
      description: (p.excerpt?.rendered || '').replace(/<[^>]*>/g, '').trim().substring(0, 280),
      pubDate:     p.date ? new Date(p.date).toISOString() : null,
      _dateApprox: false,
      _fromWordPress: true,
    })).filter(a => a.title && a.link);
  } catch { return []; }
}

// ── Sort helper ───────────────────────────────────────────────────────────
// Sorts newest-first. Within the same calendar day, preserves editorial order
// (homepage position) as a proxy for intra-day recency, since URL dates lack
// time-of-day precision.
function sortArticles(articles) {
  // Tag original position BEFORE any sort — this is the page/editorial order
  const tagged = articles.map((a, i) => {
    if (a._idx == null) a._idx = i;
    return a;
  });
  return tagged.sort((a, b) => {
    const da = a.pubDate ? new Date(a.pubDate) : null;
    const db = b.pubDate ? new Date(b.pubDate) : null;
    if (!da && !db) return (a._idx ?? 0) - (b._idx ?? 0);
    if (!da) return 1;    // undated → end
    if (!db) return -1;
    // Compare by calendar day first (not exact timestamp, since URL-dates are all T12:00)
    const dayA = a.pubDate.substring(0, 10); // YYYY-MM-DD
    const dayB = b.pubDate.substring(0, 10);
    if (dayA !== dayB) return dayB.localeCompare(dayA); // newest day first
    // Same day: exact beats approx
    if (!a._dateApprox && b._dateApprox) return -1;
    if (a._dateApprox && !b._dateApprox) return 1;
    // Same day, same precision: keep editorial/page order (higher on page = more recent)
    return (a._idx ?? 0) - (b._idx ?? 0);
  });
}

async function scrapeWebPage(pageUrl, targetDate, prefetchedHtml = null) {
  const { origin, hostname } = new URL(pageUrl);

  // ── Strategies 1+2: WordPress REST API and RSS (run in parallel) ──────────
  const [wpResults, rssResults] = await Promise.all([
    extractFromWordPress(pageUrl),
    extractFromRss(pageUrl),
  ]);

  // ── Fetch page HTML (reuse if pre-fetched, e.g. from fetchWebSource) ──────
  const rawHtml = prefetchedHtml || await fetchRaw(pageUrl);
  const doc = new DOMParser().parseFromString(rawHtml, 'text/html');
  let base = doc.querySelector('base');
  if (!base) { base = doc.createElement('base'); doc.head.appendChild(base); }
  base.href = pageUrl;

  // ── Strategies 3-6: HTML-based extractors ─────────────────────────────────
  const htmlItems = [
    ...extractFromNextData(doc, pageUrl),       // Next.js __NEXT_DATA__
    ...extractFromJsonLd(doc, pageUrl),          // JSON-LD schema.org
    ...extractFromArticleElements(doc, pageUrl), // <article> + semantic classes
    ...extractFromLinks(doc, pageUrl),           // link-pattern heuristic
  ];

  // ── Merge: WordPress results take priority (have exact dates) ─────────────
  const byKey = new Map();
  let order = 0;

  for (const item of [...wpResults, ...rssResults, ...htmlItems]) {
    if (!item.link || !isStrongHomepageArticle(item, pageUrl)) continue;
    // Universal URL-date fallback for items still missing a date
    if (!item.pubDate) {
      const urlDate = dateFromUrl(item.link);
      if (urlDate) { item.pubDate = urlDate.iso; item._dateApprox = urlDate.approx; item._dateFromUrl = true; }
    }
    const key = normalizedArticleKey(item.link);
    const enriched = { ...item, _idx: byKey.get(key)?._idx ?? order++ };
    byKey.set(key, preferArticleItem(byKey.get(key), enriched));
  }
  const all = [...byKey.values()];

  const dated   = all.filter(a => a.pubDate && !isNaN(new Date(a.pubDate)));
  const undated = all.filter(a => !a.pubDate || isNaN(new Date(a.pubDate)));
  // Keep all articles — sort puts dated first, undated at end
  const corpus  = all;

  // ── Date filter ───────────────────────────────────────────────────────────
  const toLocalDate = d => new Date(d).toLocaleDateString('en-CA');

  if (targetDate) {
    const exact = corpus.filter(a =>
      a.pubDate && !a._dateApprox && !isNaN(new Date(a.pubDate))
      && toLocalDate(a.pubDate) === targetDate
    );
    const approxMatch = corpus.filter(a =>
      a.pubDate && a._dateApprox && !isNaN(new Date(a.pubDate))
      && a.pubDate.startsWith(targetDate.substring(0, 7))
    );
    const homepageUndated = undated.filter(a =>
      !a._fromRss && !a._fromWordPress && isStrongHomepageArticle(a, pageUrl)
    );
    homepageUndated.forEach(a => { a._undated = true; });

    let out;
    if (exact.length > 0) {
      out = sortArticles([...exact, ...homepageUndated]);
    } else if (approxMatch.length > 0) {
      approxMatch.forEach(a => { a._approxWarning = true; });
      out = sortArticles([...approxMatch, ...homepageUndated]);
    } else if (dated.length === 0) {
      undated.forEach(a => { a._undated = true; });
      out = undated.slice(0, 60);
    } else if (homepageUndated.length > 0) {
      out = homepageUndated.slice(0, 60);
    } else {
      out = [];
    }
    out._stats = { total: all.length, dated: dated.length, undated: undated.length, matched: out.length };
    return out;
  }

  // No date filter — all articles, dated first then undated
  const out = sortArticles(corpus);
  out._stats = { total: all.length, dated: dated.length, undated: undated.length, matched: out.length };
  return out;
}

function genId() { return Math.random().toString(36).slice(2, 9); }

function relativeDate(d) {
  if (!d) return '';
  const ms = Date.now() - new Date(d).getTime();
  if (ms < 60000)   return 'agora mesmo';
  if (ms < 3600000) return `${Math.floor(ms/60000)}min atrás`;
  if (ms < 86400000)return `${Math.floor(ms/3600000)}h atrás`;
  if (ms < 604800000)return `${Math.floor(ms/86400000)}d atrás`;
  return new Date(d).toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
}

function stateKey(feedId, artId) { return `${feedId}::${artId}`; }

function Spinner({ size = 'sm' }) {
  const cls = size === 'lg' ? 'w-8 h-8 border-4' : 'w-3.5 h-3.5 border-2';
  return html`<div class="${cls} border-current border-t-transparent rounded-full animate-spin opacity-60"></div>`;
}

function Badge({ label, color }) {
  return html`<span class="text-xs px-1.5 py-0.5 rounded-full font-medium ${color || CAT_COLOR[label] || 'bg-gray-100 text-gray-600'}">${label}</span>`;
}

// ── MANAGE CATEGORIES MODAL ───────────────────

function ManageCategoriesModal({ categories, onSave, onClose }) {
  const [list,    setList]    = useState([...categories]);
  const [newCat,  setNewCat]  = useState('');
  const [error,   setError]   = useState('');

  function add() {
    const v = newCat.trim();
    if (!v) return;
    if (list.map(c => c.toLowerCase()).includes(v.toLowerCase())) {
      setError('Categoria já existe.'); return;
    }
    setList(l => [...l, v]);
    setNewCat('');
    setError('');
  }

  function remove(cat) { setList(l => l.filter(c => c !== cat)); }

  function handleKey(e) { if (e.key === 'Enter') { e.preventDefault(); add(); } }

  return html`
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"
         onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[80vh]">
        <!-- Header -->
        <div class="flex items-center justify-between px-5 pt-5 pb-4 border-b border-gray-100">
          <h2 class="text-base font-semibold text-gray-900">Gerenciar Categorias</h2>
          <button onClick=${onClose} class="text-gray-400 hover:text-gray-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- List -->
        <div class="flex-1 overflow-y-auto px-5 py-3 space-y-1">
          ${list.length === 0 && html`
            <p class="text-xs text-gray-400 text-center py-4">Nenhuma categoria. Adicione uma abaixo.</p>`}
          ${list.map(cat => html`
            <div key=${cat} class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gray-50 group">
              <span class="text-sm text-gray-700">${cat}</span>
              <button onClick=${() => remove(cat)}
                class="opacity-0 group-hover:opacity-100 transition-opacity text-red-400 hover:text-red-600 p-0.5 rounded">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>`)}
        </div>

        <!-- Add new -->
        <div class="px-5 pb-3 pt-2 border-t border-gray-100">
          <div class="flex gap-2 mb-1">
            <input type="text" value=${newCat}
              onInput=${e => { setNewCat(e.target.value); setError(''); }}
              onKeyDown=${handleKey}
              placeholder="Nova categoria…"
              class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button type="button" onClick=${add}
              class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
              Adicionar
            </button>
          </div>
          ${error && html`<p class="text-xs text-red-500">${error}</p>`}
        </div>

        <!-- Footer -->
        <div class="flex gap-2 px-5 pb-5 pt-1">
          <button onClick=${onClose}
            class="flex-1 px-4 py-2 border border-gray-300 rounded-xl text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            Cancelar
          </button>
          <button onClick=${() => onSave(list)}
            class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 transition-colors">
            Salvar
          </button>
        </div>
      </div>
    </div>`;
}

// ── CATEGORY PICKER ───────────────────────────

function CategoryPicker({ selected, onChange, categories, onManage }) {
  function toggle(cat) {
    onChange(selected.includes(cat)
      ? selected.filter(c => c !== cat)
      : [...selected, cat]);
  }
  return html`
    <div>
      <div class="grid grid-cols-2 gap-0.5">
        ${categories.map(cat => {
          const on = selected.includes(cat);
          return html`
            <button key=${cat} type="button" onClick=${() => toggle(cat)}
              class="flex items-center gap-1.5 px-2 py-1.5 rounded-lg text-xs transition-colors text-left ${on ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-600 hover:bg-gray-100'}">
              <span class="w-3.5 h-3.5 rounded border flex-shrink-0 flex items-center justify-center ${on ? 'bg-blue-600 border-blue-600' : 'border-gray-300'}">
                ${on && html`<svg class="w-2 h-2 text-white" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>`}
              </span>
              ${cat}
            </button>`;
        })}
      </div>
      ${onManage && html`
        <button type="button" onClick=${onManage}
          class="mt-2 flex items-center gap-1 text-xs text-gray-400 hover:text-blue-600 transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Gerenciar categorias
        </button>`}
    </div>`;
}

// ── ADD FEED MODAL ────────────────────────────

function AddFeedModal({ onAdd, onClose, categories: allCategories, onManageCategories }) {
  const [url,        setUrl]        = useState('');
  const [name,       setName]       = useState('');
  const [categories, setCategories] = useState(
    allCategories?.includes('Notícias Gerais') ? ['Notícias Gerais'] : allCategories?.slice(0,1) ?? ['Notícias Gerais']
  );
  const [loading,    setLoading]    = useState(false);
  const [error,      setError]      = useState('');

  async function submit(e) {
    e.preventDefault();
    if (!url.trim()) return;
    if (categories.length === 0) { setError('Selecione ao menos uma categoria.'); return; }
    setLoading(true); setError('');
    try {
      const data = await fetchFeed(url.trim(), 1);
      const host = new URL(url.trim()).hostname;
      onAdd({
        id:         genId(),
        url:        url.trim(),
        name:       name.trim() || data.info.title || host,
        categories,
        favicon:    data.info.favicon || `https://www.google.com/s2/favicons?domain=${host}&sz=32`,
        addedAt:    new Date().toISOString(),
      });
      onClose();
    } catch (err) {
      setError(`Não foi possível carregar o feed: ${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  return html`
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
        <div class="p-6">
          <div class="flex items-center justify-between mb-5">
            <h2 class="text-base font-semibold text-gray-900">Adicionar Feed RSS</h2>
            <button onClick=${onClose} class="p-1 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600">${Ico.x()}</button>
          </div>
          <form onSubmit=${submit} class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">URL do Feed <span class="text-red-400">*</span></label>
              <input type="url" value=${url} onInput=${e=>setUrl(e.target.value)}
                placeholder="https://exemplo.com/feed.xml"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                required autoFocus />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Nome (opcional – detectado automaticamente)</label>
              <input type="text" value=${name} onInput=${e=>setName(e.target.value)}
                placeholder="Ex: G1 Tecnologia"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">
                Categorias
                ${categories.length > 0 && html`<span class="ml-1 text-blue-600 font-semibold">(${categories.length} selecionada${categories.length>1?'s':''})</span>`}
              </label>
              <div class="border border-gray-200 rounded-xl p-2 bg-gray-50">
                <${CategoryPicker} selected=${categories} onChange=${setCategories}
                  categories=${allCategories ?? DEFAULT_CATEGORIES}
                  onManage=${onManageCategories} />
              </div>
              ${categories.length === 0 && html`<p class="text-xs text-amber-600 mt-1">Selecione ao menos uma categoria.</p>`}
            </div>
            ${error && html`<p class="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-lg">${error}</p>`}
            <div class="flex gap-3 pt-1">
              <button type="button" onClick=${onClose}
                class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm font-medium">
                Cancelar
              </button>
              <button type="submit" disabled=${loading || categories.length === 0}
                class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 text-sm font-medium flex items-center justify-center gap-2">
                ${loading ? html`<${Spinner}/>` : ''}
                ${loading ? 'Verificando…' : 'Adicionar'}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>`;
}

// ── ARTICLE CARD ─────────────────────────────

function ArticleCard({ article, feed, st, onRead, onSelect }) {
  const read     = !!st?.read;
  const selected = !!st?.selected;
  const pub = article.pubDate instanceof Date ? article.pubDate : new Date(article.pubDate);

  return html`
    <article class="bg-white rounded-xl border border-gray-200 hover:border-blue-300 hover:shadow-md transition-all overflow-hidden flex flex-col ${read ? 'opacity-55' : ''}">
      ${article.thumbnail && html`
        <div class="aspect-video bg-gray-100 overflow-hidden flex-shrink-0">
          <img src=${article.thumbnail} alt="" class="w-full h-full object-cover"
            onError=${e => { e.target.closest('.aspect-video').style.display='none'; }} />
        </div>`}
      <div class="p-4 flex flex-col flex-1">
        <!-- Meta row -->
        <div class="flex items-center gap-1.5 mb-2 flex-wrap">
          ${feed.favicon && html`<img src=${feed.favicon} class="w-3.5 h-3.5 rounded flex-shrink-0"
            onError=${e=>e.target.style.display='none'} />`}
          <span class="text-xs text-gray-500 font-medium truncate max-w-[8rem]">${feed.name}</span>
          <span class="text-gray-300 text-xs">·</span>
          ${(feed.categories||[feed.category]).map(c => html`<${Badge} key=${c} label=${c} />`)}
          <span class="text-xs text-gray-400 ml-auto whitespace-nowrap">${relativeDate(pub)}</span>
        </div>
        <!-- Title -->
        <a href=${article.link} target="_blank" rel="noopener noreferrer" class="group mb-2">
          <h3 class="text-sm font-semibold text-gray-900 line-clamp-2 group-hover:text-blue-600 leading-snug transition-colors">
            ${article.title}
          </h3>
        </a>
        <!-- Description -->
        ${article.description && html`
          <p class="text-xs text-gray-500 line-clamp-2 mb-3 leading-relaxed flex-1">${article.description}</p>`}
        <!-- Actions -->
        <div class="flex items-center gap-2 mt-auto pt-1">
          <button onClick=${onRead}
            title=${read ? 'Marcar como não lido' : 'Marcar como lido'}
            class="flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs font-medium transition-colors ${read ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">
            ${Ico.eye(read)} ${read ? 'Lido' : 'Marcar lido'}
          </button>
          <button onClick=${onSelect}
            title=${selected ? 'Remover da seleção' : 'Pré-selecionar para ronda'}
            class="flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs font-medium transition-colors ${selected ? 'bg-amber-100 text-amber-700 hover:bg-amber-200' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">
            ${Ico.mark(selected)} ${selected ? 'Selecionado' : 'Selecionar'}
          </button>
          <a href=${article.link} target="_blank" rel="noopener noreferrer"
            class="ml-auto flex items-center gap-0.5 text-xs text-gray-400 hover:text-blue-500 transition-colors">
            Abrir ${Ico.link()}
          </a>

const WEB_FEED_ID = '__websearch__';

/// Sort helper: newest first, preserves _stats metadata
function sortByDate(arts) {
  const sorted = sortArticles(arts);
  if (arts._stats) sorted._stats = arts._stats;
  return sorted;
}

// Translate a batch of articles in background (preserves _stats metadata)
async function translateBatch(arts) {
  const translated = await Promise.all(arts.map(async art => {
    try {
      const [title, description] = await Promise.all([
        gtranslate(art.title),
        art.description ? gtranslate(art.description) : Promise.resolve(''),
      ]);
      return { ...art, title, description };
    } catch { return art; }
  }));
  if (arts._stats) translated._stats = arts._stats;
  return translated;
}

// Progressively fetch og:description for every article without a description.
// Processes in batches of 5; calls onProgress(updatedArts, done, total) after each batch.
async function enrichWithSummaries(arts, onProgress) {
  const BATCH = 5;
  const toFetch = arts.filter(a => !a.description && a.link && !isForbesArticleUrl(a.link));
  if (toFetch.length === 0) return arts;

  let current = [...arts];
  if (arts._stats) current._stats = arts._stats;
  let done = 0;
  const total = toFetch.length;

  for (let i = 0; i < toFetch.length; i += BATCH) {
    const batch = toFetch.slice(i, i + BATCH);
    const settled = await Promise.allSettled(
      batch.map(async art => {
        try {
          const raw = await fetchRaw(art.link);
          if (isBlockedHtmlResponse(raw)) return { link: art.link, description: '' };
          const doc = new DOMParser().parseFromString(raw, 'text/html');
          const jsonLd = extractFromJsonLd(doc, art.link).find(item => item.link === art.link);
          const bodyText = (() => {
            const articleBody = doc.querySelector('article,[itemprop="articleBody"],[class*="article-body"],[class*="content-body"],[class*="post-content"]');
            if (!articleBody) return '';
            const parts = [...articleBody.querySelectorAll('p')]
              .map(p => cleanArticleText(p.textContent))
              .filter(t => t.length > 40 && !/^(leia tamb[eé]m|read more|subscribe|assine|publicidade)/i.test(t));
            return parts.slice(0, 2).join(' ').substring(0, 280);
          })();
          const raw_desc =
            jsonLd?.description ||
            doc.querySelector('meta[property="og:description"]')?.getAttribute('content') ||
            doc.querySelector('meta[name="twitter:description"]')?.getAttribute('content') ||
            doc.querySelector('meta[name="description"]')?.getAttribute('content') ||
            bodyText ||
            '';
          const clean = raw_desc.replace(/<[^>]*>/g, '').trim().substring(0, 280);
          const translated = clean ? await gtranslate(clean).catch(() => clean) : '';
          return { link: art.link, description: translated };
        } catch {
          return { link: art.link, description: '' };
        }
      })
    );

    const map = new Map();
    settled.forEach(r => {
      if (r.status === 'fulfilled' && r.value.description) map.set(r.value.link, r.value.description);
    });

    done += batch.length;

    if (map.size > 0) {
      current = current.map(a => map.has(a.link) ? { ...a, description: map.get(a.link) } : a);
      if (arts._stats) current._stats = arts._stats;
    }
    onProgress?.(current, done, total);
  }

  return current;
}

// Fetch + scrape one URL, auto-detect RSS hint (single fetch, reused)
async function fetchWebSource(url, targetDate) {
  const rawHtml = await fetchRaw(url);
  let rssHint = null;
  try {
    const doc = new DOMParser().parseFromString(rawHtml, 'text/html');
    const rssEl = doc.querySelector('link[type="application/rss+xml"],link[type="application/atom+xml"]');
    if (rssEl) rssHint = resolveUrl(rssEl.getAttribute('href'), url) || null;
  } catch {}
  const arts = await scrapeWebPage(url, targetDate, rawHtml); // reuse HTML
  return { arts, rssHint };
}

function WebSearch({ states, onToggle, sources = [], activeSourceId, onSelectSource, onSaveSource, onDeleteSource, onRenameSource }) {
  const today     = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

  // ── local state ───────────────────────────────
  const [url,          setUrl]          = useState('');
  const [date,         setDate]         = useState(today);
  const [filterDate,   setFilterDate]   = useState(true);
  const [loading,      setLoading]      = useState(false);   // true | 'multi'
  const [translating,  setTranslating]  = useState(false);
  const [enriching,    setEnriching]    = useState(false);
  const [enrichProg,   setEnrichProg]   = useState({ done: 0, total: 0 });
  const [results,      setResults]      = useState(null);
  const [errors,       setErrors]       = useState([]);
  const [rssHints,     setRssHints]     = useState([]);
  const [showRead,     setShowRead]     = useState(false);   // toggle to show hidden articles
  const [renamingId,   setRenamingId]   = useState(null);
  const [renameVal,    setRenameVal]    = useState('');
  // multi-source selection
  const [selected,     setSelected]     = useState(new Set()); // source IDs checked for Ronda Web

  // Sync URL when active source changes from sidebar
  useEffect(() => {
    const src = sources.find(s => s.id === activeSourceId);
    if (src) { setUrl(src.url); setSelected(new Set()); }
  }, [activeSourceId]);

  // ── helpers ───────────────────────────────────
  const targetDate = filterDate && date ? date : null;

  function autoSave(rawUrl) {
    if (!rawUrl) return;
    if (sources.find(s => s.url === rawUrl)) {
      onSelectSource?.(sources.find(s => s.url === rawUrl).id);
    } else {
      let name = rawUrl;
      try { name = new URL(rawUrl).hostname.replace(/^www\./, ''); } catch {}
      const newSrc = { id: genId(), url: rawUrl, name, addedAt: new Date().toISOString() };
      onSaveSource?.(newSrc);
      onSelectSource?.(newSrc.id);
    }
  }

  function applyStatesFilter(arts) {
    if (showRead) return arts;
    return arts.filter(art => {
      const sk = stateKey(WEB_FEED_ID, art.link || art.title);
      const st = states?.[sk] || {};
      // Always show saved; hide read/dismissed
      if (st.selected) return true;
      if (st.read)     return false;
      return true;
    });
  }

  // ── single URL search ─────────────────────────
  async function searchSingle(e) {
    e.preventDefault();
    const cleanUrl = url.trim();
    if (!cleanUrl) return;
    setLoading(true); setErrors([]); setResults(null); setRssHints([]);
    try {
      const { arts, rssHint } = await fetchWebSource(cleanUrl, targetDate);
      if (rssHint) setRssHints([{ url: cleanUrl, hint: rssHint }]);
      autoSave(cleanUrl);
      const sorted = sortByDate(arts);
      setResults(sorted);
      setLoading(false);

      // Phase 1: translate titles + existing descriptions
      setTranslating(true);
      const translated = await translateBatch(sorted);
      setResults(translated);
      setTranslating(false);

      // Phase 2: progressively enrich articles without descriptions
      const missing = translated.filter(a => !a.description && a.link).length;
      if (missing > 0) {
        setEnriching(true);
        setEnrichProg({ done: 0, total: missing });
        await enrichWithSummaries(translated, (updated, done, total) => {
          setEnrichProg({ done, total });
          setResults(updated);
        });
      }
    } catch (err) {
      setErrors([{ url: cleanUrl, msg: err.message }]);
    } finally {
      setLoading(false); setTranslating(false); setEnriching(false);
    }
  }

  // ── multi-source Ronda Web search ─────────────
  async function searchMulti() {
    if (selected.size === 0) return;
    setLoading('multi'); setErrors([]); setResults(null); setRssHints([]);
    const srcList = sources.filter(s => selected.has(s.id));
    try {
      const settled = await Promise.allSettled(
        srcList.map(s => fetchWebSource(s.url, targetDate).then(r => ({ ...r, srcName: s.name })))
      );
      const allArts = [], hints = [], errs = [];
      const seen = new Set();
      settled.forEach((res, i) => {
        if (res.status === 'rejected') {
          errs.push({ url: srcList[i].url, msg: res.reason?.message || 'Erro' });
        } else {
          if (res.value.rssHint) hints.push({ url: srcList[i].url, hint: res.value.rssHint });
          res.value.arts.forEach(art => {
            if (!seen.has(art.link)) { seen.add(art.link); allArts.push({ ...art, _source: res.value.srcName }); }
          });
        }
      });
      setRssHints(hints); setErrors(errs);
      const sorted = sortByDate(allArts);
      setResults(sorted);
      setLoading(false);

      // Phase 1: translate
      setTranslating(true);
      const translated = await translateBatch(sorted);
      setResults(translated);
      setTranslating(false);

      // Phase 2: progressively enrich articles without descriptions
      const missing = translated.filter(a => !a.description && a.link).length;
      if (missing > 0) {
        setEnriching(true);
        setEnrichProg({ done: 0, total: missing });
        await enrichWithSummaries(translated, (updated, done, total) => {
          setEnrichProg({ done, total });
          setResults(updated);
        });
      }
    } finally {
      setLoading(false); setTranslating(false); setEnriching(false);
    }
  }

  // ── derived display list ──────────────────────
  const displayed = results ? applyStatesFilter(results) : null;
  const hiddenCount = results ? results.length - (displayed?.length ?? 0) : 0;

  const dateLabel = date
    ? new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' })
    : '';

  function toggleSrc(id) {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }
  function selectAll()   { setSelected(new Set(sources.map(s => s.id))); }
  function clearAll()    { setSelected(new Set()); }

  return html`
    <div class="space-y-4">

      <!-- ── RONDA WEB (multi-source panel) ── -->
      ${sources.length > 0 && html`
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="flex items-center justify-between mb-3">
            <p class="text-xs font-semibold text-gray-700">Ronda Web — selecione as fontes</p>
            <div class="flex gap-2">
              <button onClick=${selectAll} class="text-xs text-blue-500 hover:text-blue-700">Todas</button>
              <span class="text-gray-300">|</span>
              <button onClick=${clearAll} class="text-xs text-gray-400 hover:text-gray-600">Limpar</button>
            </div>
          </div>

          <!-- Source checkboxes -->
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-1 mb-3">
            ${sources.map(src => html`
              <label key=${src.id}
                class="group flex items-center gap-2 px-2.5 py-2 rounded-lg border cursor-pointer transition-colors
                  ${selected.has(src.id) ? 'bg-blue-50 border-blue-300' : 'border-gray-200 hover:border-blue-200'}">
                <input type="checkbox" checked=${selected.has(src.id)}
                  onChange=${() => toggleSrc(src.id)}
                  class="w-3.5 h-3.5 rounded border-gray-300 text-blue-600 flex-shrink-0" />
                <div class="flex-1 min-w-0 flex items-center gap-1.5">

async function fetchGoogleTrends(geo) {
  const url = `https://trends.google.com/trending/rss?geo=${geo}`;
  const xml = await fetchRaw(url);
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const items = doc.querySelectorAll('item');
  const trends = [];
  items.forEach((item, i) => {
    const title       = item.querySelector('title')?.textContent || '';
    const traffic     = item.querySelector('ht\\:approx_traffic, approx_traffic')?.textContent || '';
    const description = item.querySelector('description')?.textContent || '';
    const link        = item.querySelector('link')?.textContent || '';
    const pubDate     = item.querySelector('pubDate')?.textContent || '';
    // Extract news items from ht:news_item
    const newsItems = [];
    item.querySelectorAll('ht\\:news_item, news_item').forEach(ni => {
      const niTitle  = ni.querySelector('ht\\:news_item_title, news_item_title')?.textContent || '';
      const niUrl    = ni.querySelector('ht\\:news_item_url, news_item_url')?.textContent || '';
      const niSource = ni.querySelector('ht\\:news_item_source, news_item_source')?.textContent || '';
      if (niTitle) newsItems.push({ title: niTitle, url: niUrl, source: niSource });
    });
    trends.push({ rank: i + 1, title, traffic, description, link, pubDate, newsItems });
  });
  return trends;
}

async function fetchYouTubeTrending(regionCode, ytApiKey, categoryId) {
  if (!ytApiKey) return [];
  let url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=${regionCode}&maxResults=20&key=${ytApiKey}`;
  if (categoryId && categoryId !== '0') url += `&videoCategoryId=${categoryId}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`YouTube API: HTTP ${resp.status}`);
  const data = await resp.json();
  return (data.items || []).map((v, i) => ({
    rank:       i + 1,
    title:      v.snippet.title,
    channel:    v.snippet.channelTitle,
    thumbnail:  v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url || '',
    views:      parseInt(v.statistics?.viewCount || '0'),
    likes:      parseInt(v.statistics?.likeCount || '0'),
    url:        `https://www.youtube.com/watch?v=${v.id}`,
    publishedAt: v.snippet.publishedAt,
    categoryId: v.snippet.categoryId,
  }));
}

function formatNumber(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1).replace('.0','') + 'K';
  return n.toString();
}

function EditorialCheckTab() {
  const [url, setUrl] = useState('');
  const [text, setText] = useState('');
  const [images, setImages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [provider, setProvider] = useState(() => localStorage.getItem(EDITORIAL_PROVIDER_KEY) || '');
  const [serverStatus, setServerStatus] = useState({
    loading: true,
    providers: [],
    requiresPassword: false,
    error: '',
  });

  async function loadServerStatus() {
    setServerStatus(prev => ({ ...prev, loading: true, error: '' }));
    try {
      const resp = await fetch('/api/config');
      if (!resp.ok) throw new Error(`Config ${resp.status}`);
      const data = await resp.json();
      setServerStatus({
        loading: false,
        providers: data.serverProviders || [],
        requiresPassword: !!data.requiresPassword,
        error: '',
      });
      if (!provider && data.serverProviders?.length) {
        setProvider(data.serverProviders[0]);
      }
    } catch (err) {
      setServerStatus({
        loading: false,
        providers: [],
        requiresPassword: false,
        error: err.message || 'Não foi possível verificar o servidor.',
      });
    }
  }

  useEffect(() => { loadServerStatus(); }, []);
  useEffect(() => {
    provider ? localStorage.setItem(EDITORIAL_PROVIDER_KEY, provider) : localStorage.removeItem(EDITORIAL_PROVIDER_KEY);
  }, [provider]);

  async function handleFiles(selectedFiles) {
    const files = Array.from(selectedFiles || []).filter(file => file.type.startsWith('image/')).slice(0, 6);
    if (files.length === 0) return;
    const payload = await Promise.all(files.map(async file => ({
      id: `${file.name}-${file.size}-${file.lastModified}`,
      name: file.name,
      size: file.size,
      preview: await fileToDataUrl(file),
    })));
    setImages(prev => [...prev, ...payload].slice(0, 6));
  }

  function removeImage(id) {
    setImages(prev => prev.filter(image => image.id !== id));
  }

  async function analyze() {
    if (!url.trim() && !text.trim() && images.length === 0) {
      setError('Envie ao menos uma URL, um texto ou uma imagem.');
      return;
    }

    setLoading(true);
    setError('');
    setResult(null);

    try {
      const resp = await fetch('/api/editorial-check', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          url: url.trim(),
          text: text.trim(),
          images: images.map(image => image.preview),
          provider: provider || undefined,
          accessToken: localStorage.getItem(ACCESS_TOKEN_KEY) || '',
        }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      setResult(data);
    } catch (err) {
      setError(err.message || 'Falha ao rodar a checagem editorial.');
    } finally {
      setLoading(false);
    }
  }

  async function copyResult() {
    if (!result?.analysis) return;
    try {
      await navigator.clipboard.writeText(result.analysis);
    } catch {}
  }

  const hasInputs = url.trim() || text.trim() || images.length > 0;
  return html`
    <div class="space-y-4">
      <div class="bg-white rounded-xl border border-gray-200 p-4 sm:p-5">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
          <div>
            <h2 class="text-lg font-semibold text-gray-900">Art Check</h2>
            <p class="text-sm text-gray-500 mt-1">
              Suba imagens, cole o texto original e/ou informe a URL. A análise cruza os materiais e aponta incongruências, riscos editoriais e sugestões de melhoria.
            </p>
          </div>
          <button onClick=${loadServerStatus}
            class="flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors self-start">
            ${Ico.refresh(serverStatus.loading)}
            Verificar IA
          </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_260px] gap-4 mt-5">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">URL original</label>
              <input type="url" value=${url} onInput=${e => setUrl(e.target.value)}
                placeholder="https://www.site.com/materia"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              <p class="text-xs text-gray-400 mt-1">Se você preencher a URL, o servidor tenta extrair o texto da página antes da análise.</p>
            </div>

            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Texto original</label>
              <textarea value=${text} onInput=${e => setText(e.target.value)}
                rows="10"
                placeholder="Cole aqui a chamada, legenda, texto da newsletter, resumo ou qualquer versão original que precise ser revisada."
                class="w-full px-3 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"></textarea>
            </div>

            <div>
              <div class="flex items-center justify-between gap-3 mb-2">
                <label class="block text-xs font-medium text-gray-500">Imagens</label>
                <span class="text-xs text-gray-400">até 6 arquivos</span>
              </div>
              <label class="flex flex-col items-center justify-center gap-2 border border-dashed border-gray-300 rounded-xl px-4 py-6 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/40 transition-colors">
                <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center text-gray-500">${Ico.upload()}</span>
                <div>
                  <p class="text-sm font-medium text-gray-700">Selecionar imagens</p>

                      </div>
                    </div>`)}
                </div>`}
            </div>
          </div>

          <div class="space-y-3">
            <div class="border border-gray-200 rounded-xl p-4 bg-gray-50">
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Execução</p>

              <div class="space-y-3">
                <div>
                  <label class="block text-xs font-medium text-gray-500 mb-1">Provedor</label>
                  <select value=${provider} onChange=${e => setProvider(e.target.value)}
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">Automático</option>
                    ${serverStatus.providers.map(name => html`
                      <option key=${name} value=${name}>${name}</option>`)}
                  </select>
                </div>

                <div class="grid grid-cols-1 gap-2 text-xs">
                  <div class="border border-gray-200 rounded-lg px-3 py-2 bg-white">
                    <span class="text-gray-400">Servidor</span>
                    <p class="font-medium text-gray-700 mt-0.5">
                      ${serverStatus.loading ? 'verificando...' : serverStatus.error ? 'indisponível' : serverStatus.providers.length ? serverStatus.providers.join(', ') : 'sem provedor configurado'}
                    </p>
                  </div>
                  <div class="border border-gray-200 rounded-lg px-3 py-2 bg-white">
                    <span class="text-gray-400">Senha</span>
                    <p class="font-medium text-gray-700 mt-0.5">
                      ${serverStatus.requiresPassword ? 'necessária' : 'não exigida'}
                    </p>
                  </div>
                  <div class="border border-gray-200 rounded-lg px-3 py-2 bg-white">
                    <span class="text-gray-400">Entradas</span>
                    <p class="font-medium text-gray-700 mt-0.5">
                      ${[
                        url.trim() ? 'URL' : null,
                        text.trim() ? 'texto' : null,
                        images.length ? `${images.length} imagem(ns)` : null,
                      ].filter(Boolean).join(' + ') || 'nenhuma'}

                  </div>

                <button onClick=${analyze} disabled=${loading || !hasInputs}

function ApiSettingsTab() {
  const [googleClientId, setGoogleClientId] = useState(() => localStorage.getItem(GOOGLE_CLIENT_ID_KEY) || '');

  const [accessToken, setAccessToken] = useState(() => localStorage.getItem(ACCESS_TOKEN_KEY) || '');
  const [savedMsg, setSavedMsg] = useState('');
  const [serverStatus, setServerStatus] = useState({
    loading: true,
    googleClientId: '',
    providers: [],
    requiresPassword: false,
    error: '',
  });

  async function loadServerStatus() {
    setServerStatus(s => ({ ...s, loading: true, error: '' }));
    const [googleRes, configRes] = await Promise.allSettled([
      fetch('/api/google-client-id').then(r => r.ok ? r.json() : Promise.reject(new Error(`Google Client ID ${r.status}`))),
      fetch('/api/config').then(r => r.ok ? r.json() : Promise.reject(new Error(`Config ${r.status}`))),
    ]);
    setServerStatus({
      loading: false,
      googleClientId: googleRes.status === 'fulfilled' ? (googleRes.value.clientId || '') : '',
      providers: configRes.status === 'fulfilled' ? (configRes.value.serverProviders || []) : [],
      requiresPassword: configRes.status === 'fulfilled' ? !!configRes.value.requiresPassword : false,
      error: [googleRes, configRes]
        .filter(r => r.status === 'rejected')
        .map(r => r.reason?.message || 'erro')
        .join(' · '),
    });
  }

  useEffect(() => { loadServerStatus(); }, []);

  function saveSettings() {
    const cleanGoogle = googleClientId.trim();
    const cleanYoutube = ytApiKey.trim();
    const cleanToken = accessToken.trim();
    cleanGoogle ? localStorage.setItem(GOOGLE_CLIENT_ID_KEY, cleanGoogle) : localStorage.removeItem(GOOGLE_CLIENT_ID_KEY);
    cleanYoutube ? localStorage.setItem(YOUTUBE_API_KEY, cleanYoutube) : localStorage.removeItem(YOUTUBE_API_KEY);
    cleanToken ? localStorage.setItem(ACCESS_TOKEN_KEY, cleanToken) : localStorage.removeItem(ACCESS_TOKEN_KEY);
    setSavedMsg('Configurações salvas neste navegador.');
    setTimeout(() => setSavedMsg(''), 3500);
  }

  const effectiveGoogle = googleClientId.trim() || serverStatus.googleClientId;

  return html`
